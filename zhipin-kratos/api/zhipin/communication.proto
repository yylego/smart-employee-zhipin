syntax = "proto3";

package api.zhipin;

option go_package = "github.com/yylego/smart-employee-zhipin/zhipin-kratos/api/zhipin;zhipin";

import "google/api/annotations.proto";

// CommunicationService — sync and retrieve chat records per position
service CommunicationService {
  rpc SyncChat (SyncChatReq) returns (SyncChatResp) {
    option (google.api.http) = { post: "/api/chat/{job_id}", body: "*" };
  }
  rpc GetChat (GetChatReq) returns (GetChatResp) {
    option (google.api.http) = { get: "/api/chat/{job_id}" };
  }
}

message ChatMessage {
  int32  direction = 1;       // 0=me 1=them
  string content = 2;         // message text
  int64  timestamp = 3;       // unix seconds
  bool   is_resume = 4;       // is this a resume message
  string resume_version = 5;  // resume filename if is_resume=true
}

message SyncChatReq {
  string job_id = 1;
  repeated ChatMessage messages = 2;
}

message SyncChatResp {
  int64  last_comm_at = 1;    // extracted from messages
  int32  last_comm_dir = 2;   // extracted from messages
  string last_resume = 3;     // extracted from messages
  int32  message_count = 4;
}

message GetChatReq {
  string job_id = 1;
}

message GetChatResp {
  repeated ChatMessage messages = 1;
}
